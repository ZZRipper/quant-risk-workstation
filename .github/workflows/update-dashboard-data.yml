name: Update dashboard data

on:
  workflow_dispatch:
  schedule:
    # Runs after the regular U.S. market close. GitHub schedules use UTC.
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-dashboard-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build dashboard data
        env:
          PYTHONUNBUFFERED: "1"
          DASHBOARD_DATA_SOURCE: "yahoo"
        run: python scripts/build_dashboard_data.py

      - name: Prepare static site
        run: python scripts/prepare_public.py

      - name: Commit updated dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data public reports
          if git diff --cached --quiet; then
            echo "No dashboard data changes to commit."
          else
            git commit -m "Update dashboard data"
            git push
          fi
